<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Empire Age - Lobby</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Georgia', serif; }
        
        #menu-container, #lobby-container { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; z-index: 10; 
        }

        #menu-container { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://alphacoders.com') center/cover; 
        }

        .menu-box, .lobby-paper { 
            background: #d9b382; border: 8px double #4a3b2b; padding: 30px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.9); color: #4a3b2b;
        }

        .lobby-main { display: flex; gap: 20px; margin-top: 20px; text-align: left; }
        .player-list-box { flex: 2; background: rgba(0,0,0,0.05); border: 2px solid #8b5a2b; padding: 10px; min-width: 400px; }
        .list-header { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 2px solid #8b5a2b; padding-bottom: 5px; margin-bottom: 10px; }
        
        .player-row { display: flex; gap: 10px; margin-bottom: 5px; }
        input, select { background: #f1d392; border: 1px solid #4a3b2b; padding: 5px; font-family: 'Georgia', serif; }

        .preview-container { flex: 1; background: rgba(0,0,0,0.05); border: 2px solid #8b5a2b; padding: 15px; text-align: center; }
        #map-preview { border: 2px solid #4a3b2b; background: #000; margin-bottom: 10px; image-rendering: pixelated; }

        .menu-btn { 
            background: #4a3b2b; color: #f1d392; border: 1px solid #c5a059; 
            padding: 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .menu-btn:hover { background: #c5a059; color: #281e14; }
        .btn-ready { background: #2d4c1e; font-weight: bold; }

        #game-canvas { display: none; width: 100vw; height: 100vh; }
        #debug-info { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.5); z-index: 100; pointer-events: none; }
        .ui-panel { position: absolute; bottom: 0; width: 100%; height: 120px; background: rgba(40,30,20,0.9); display: none; border-top: 3px solid #c5a059; }
    </style>
</head>
<body>

    <div id="debug-info">X: 0, Y: 0</div>

    <div id="menu-container">
        <div class="menu-box">
            <h1 style="text-shadow: 2px 2px #000; color: #f1d392;">EMPIRE AGE</h1>
            <button class="menu-btn" style="width: 200px;" onclick="openLobby()">Multiplayer</button>
        </div>
    </div>

    <div id="lobby-container" style="display:none;">
        <div class="lobby-paper">
            <div class="lobby-header">
                <h2 style="margin: 0; color: #4a3b2b;">Multiplayer Game Lobby</h2>
            </div>
            
            <div class="lobby-main">
                <div class="player-list-box">
                    <div class="list-header">
                        <span>Játékos</span>
                        <span>Civilizáció</span>
                        <span>Csapat</span>
                    </div>
                    <div class="player-row">
                        <input type="text" id="player-name" value="Player 1 (Gazda)">
                        <select id="civ-select" onchange="updateCivDisplay()">
                            <option>Magyarok</option>
                            <option>Brittek</option>
                            <option>Vikingek</option>
                            <option>Franciák</option>
                        </select>
                        <select style="width: 50px;"><option>1</option><option>2</option></select>
                    </div>
                </div>

                <div class="side-panel">
                    <div class="preview-container">
                        <h4 style="margin: 0 0 10px 0;">Pálya Előnézet</h4>
                        <canvas id="map-preview" width="200" height="200"></canvas>
                        <div style="text-align: left; font-size: 0.8rem;">
                            <label>World Seed:</label>
                            <input type="number" id="map-seed-input" value="4242" oninput="updatePreview()">
                            <button class="menu-btn" style="font-size: 0.7rem; padding: 5px; margin-top: 5px;" onclick="randomizeSeed()">Random Seed</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lobby-footer" style="margin-top: 20px; display: flex; justify-content: space-between;">
                <button class="menu-btn" style="width: auto; padding: 8px 20px;" onclick="location.reload()">Kilépés</button>
                <button class="menu-btn btn-ready" style="width: auto; padding: 8px 40px;" onclick="launchGame()">INDÍTÁS</button>
            </div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>
    <div id="build-menu" class="ui-panel"></div>

    <script src="math-engine.js"></script>
    <script src="module-globals.js"></script>
    <script src="module-worldgen.js"></script>
    <script src="module-engine.js"></script>
    <script src="module-ui.js"></script>
</body>
</html>
