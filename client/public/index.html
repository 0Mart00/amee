<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Age - Modular AI Isometric Engine</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Georgia', serif;
            color: #4a3b2b;
            user-select: none;
        }

        /* --- UI STYLES --- */
        #menu-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1599408162165-44a14e213302?q=80&w=2070&auto=format&fit=crop') center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .menu-box {
            background: rgba(40, 30, 20, 0.95);
            border: 4px double #c5a059;
            padding: 50px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            text-align: center;
            min-width: 350px;
        }

        h1 {
            color: #f1d392;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 3px 3px #000;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #4a3b2b;
            color: #f1d392;
            border: 1px solid #c5a059;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .menu-btn:hover {
            background: #c5a059;
            color: #281e14;
        }

        #lobby-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            z-index: 90;
        }

        .lobby-paper {
            background: #d9b382;
            border: 8px double #4a3b2b;
            padding: 25px;
            width: 90%;
            max-width: 1100px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            position: relative;
        }

        .lobby-main {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        .player-list-box {
            background: rgba(0,0,0,0.05);
            border: 2px solid #8b5a2b;
            padding: 15px;
        }

        #ai-lore-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px dashed #4a3b2b;
            font-style: italic;
            font-size: 0.9rem;
            max-height: 150px;
            overflow-y: auto;
        }

        #build-menu {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: rgba(40, 30, 20, 0.95);
            border-left: 3px solid #c5a059;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 110;
            overflow-y: auto;
        }

        .build-category {
            font-weight: bold;
            color: #f1d392;
            border-bottom: 1px solid #c5a059;
            margin-top: 15px;
            padding-bottom: 3px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .build-item {
            background: #4a3b2b;
            color: #f1d392;
            padding: 10px;
            border: 1px solid #c5a059;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
        }

        .build-item:hover { background: #c5a059; color: #281e14; }
        .build-item.selected { background: #c5a059; color: #281e14; border-color: #fff; }

        #game-canvas {
            display: none;
            width: 100vw;
            height: 100vh;
            background: #111;
            cursor: crosshair;
        }

        #ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            padding: 15px;
            border: 2px solid #c5a059;
            color: #f1d392;
            display: none;
            z-index: 50;
            min-width: 250px;
        }

        #ai-advice-panel {
            position: absolute;
            top: 50px;
            left: 20px;
            width: 300px;
            background: rgba(40, 30, 20, 0.9);
            border: 2px solid #c5a059;
            padding: 15px;
            color: #f1d392;
            display: none;
            z-index: 60;
            font-size: 0.9rem;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        .resource-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 240px;
            background: rgba(20, 15, 10, 0.85);
            height: 40px;
            display: none;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            color: #f1d392;
            border-bottom: 2px solid #c5a059;
            z-index: 100;
        }

        #civ-banner-img {
            width: 100%;
            max-height: 150px;
            object-fit: contain;
            background: #333;
            border: 1px solid #c5a059;
            margin-top: 10px;
            display: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #f1d392;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- DOM ELEMENTS -->
    <div id="menu-container">
        <div class="menu-box">
            <h1>Empire Age</h1>
            <button class="menu-btn" onclick="openLobby()">Többjátékos Mód</button>
            <button class="menu-btn" onclick="location.reload()">Kilépés</button>
        </div>
    </div>

    <div id="lobby-container">
        <div class="lobby-paper">
            <h2 style="margin: 0 0 20px 0; border-bottom: 2px solid #8b5a2b; color: #4a3b2b;">Birodalmi Lobby</h2>
            <div class="lobby-main">
                <div class="player-list-box">
                    <label style="font-weight: bold; color: #4a3b2b;">Uralkodó Neve:</label>
                    <input type="text" id="player-name" value="István Király" style="margin-bottom: 15px; padding: 8px; width: 100%; box-sizing: border-box;">
                    
                    <label style="font-weight: bold; display: block; margin-bottom: 5px; color: #4a3b2b;">Civilizáció:</label>
                    <select id="civ-select" onchange="updateCivDisplay()" style="padding: 8px; font-size: 1rem; width: 100%;">
                        <option value="Magyarok">Magyarok</option>
                        <option value="Brittek">Brittek</option>
                        <option value="Vikingek">Vikingek</option>
                        <option value="Franciák">Franciák</option>
                    </select>
                    
                    <div id="civ-bonus-text" style="font-size: 0.85rem; margin-top: 10px; color: #5d4a36; font-style: italic;"></div>
                    <div id="ai-lore-box">Kattints a "Történelem Generálása" gombra...</div>
                    <button class="menu-btn" style="padding: 8px; font-size: 0.8rem; margin-top: 10px;" onclick="generateWorldLore()">Történelem Generálása ✨</button>
                </div>

                <div class="side-panel">
                    <div style="background: rgba(0,0,0,0.1); border: 2px solid #8b5a2b; padding: 15px; text-align: center;">
                        <h4 style="margin: 0 0 10px 0; color: #4a3b2b;">Világ Térképe</h4>
                        <canvas id="map-preview" width="200" height="200" style="background: #000; border: 2px solid #4a3b2b; image-rendering: pixelated;"></canvas>
                        <input type="number" id="map-seed-input" value="4242" oninput="updatePreview()" style="margin-top: 10px; text-align: center; width: 100%;">
                        
                        <div id="banner-loading" style="display: none; margin-top: 10px; color: #4a3b2b; font-size: 0.8rem;">
                            <div class="loading-spinner"></div>Zászló készítése...
                        </div>
                        <img id="civ-banner-img" alt="Birodalmi Zászló">
                        <button class="menu-btn" style="padding: 8px; font-size: 0.8rem; margin-top: 10px;" onclick="generateCivBanner()">Zászló Készítése ✨</button>
                    </div>
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 20px;">
                <button class="menu-btn" style="width: auto; padding: 8px 30px;" onclick="location.reload()">Vissza</button>
                <button class="menu-btn" style="width: auto; padding: 8px 50px; background: #2d4c1e; color: #fff;" onclick="launchGame()">INDÍTÁS</button>
            </div>
        </div>
    </div>

    <div class="resource-bar" id="res-bar">
        <span><b>Fa:</b> <span id="res-wood">500</span></span>
        <span><b>Kő:</b> <span id="res-stone">200</span></span>
        <span><b>Arany:</b> <span id="res-gold">100</span></span>
        <button onclick="toggleAIAdvice()" style="background: #c5a059; border: none; padding: 5px 15px; cursor: pointer; margin-left: auto; font-weight: bold;">Birodalmi Tanácsadó ✨</button>
    </div>

    <div id="ai-advice-panel">
        <h4 style="margin: 0 0 10px 0; border-bottom: 1px solid #c5a059;">Stratégiai Tanács</h4>
        <div id="ai-advice-content">Gondolkodom...</div>
        <button onclick="toggleAIAdvice()" style="margin-top: 10px; background: #4a3b2b; color: #f1d392; border: 1px solid #c5a059; width: 100%; cursor: pointer;">Bezárás</button>
    </div>

    <div id="ui-overlay">
        <div id="selection-info">Építs birodalmat!</div>
        <div id="debug-info" style="font-size: 0.7rem; margin-top: 5px; color: #aaa;"></div>
    </div>

    <div id="build-menu"></div>
    <canvas id="game-canvas"></canvas>

    <!-- SCRIPT 1: GLOBALS & DATA -->
    <script id="module-globals"></script>
    <!-- SCRIPT 2: AI MODULE -->
    <script id="module-ai"></script>

    <!-- SCRIPT 3: WORLD GENERATION -->
    <script id="module-worldgen"></script>

    <!-- SCRIPT 4: GAME ENGINE & RENDERING -->
    <script id="module-engine"></script>

    <!-- SCRIPT 5: UI & CONTROLS -->
    <script src="module-ui.js"></script>
</body>
</html>
